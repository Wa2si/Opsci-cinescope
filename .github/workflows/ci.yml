# pipeline CI/CD GitHub Actions
# se declenche a chaque push sur main

name: CI/CD Cinescope

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # --- tests ---
  test:
    name: Tests backend
    runs-on: ubuntu-latest
    steps:
      - name: Recuperation du code
        uses: actions/checkout@v4

      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Installation des dependances
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Lancement des tests
        run: |
          cd backend
          pytest test_main.py -v

  # --- build des images docker ---
  build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: test    # on build seulement si les tests passent
    steps:
      - name: Recuperation du code
        uses: actions/checkout@v4

      - name: Build image backend
        run: docker build -t films-backend ./backend

      - name: Build image frontend
        run: docker build -t films-frontend ./frontend

  # --- deploy simule ---
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploiement (simule)
        run: |
          echo "deploiement de films-backend et films-frontend..."
          echo "deploiement OK (simule)"
