# Pipeline GitLab CI : test -> build -> deploy
# Le deploy est simulé (cf. rapport, on n'a pas de cluster externe).

stages:
  - test
  - build
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  DOCKER_TLS_CERTDIR: ""
  DOCKER_HOST: "tcp://docker:2375"
  # Vars utilisées par le service postgres (job test)
  POSTGRES_DB: cinescope
  POSTGRES_USER: cinescope
  POSTGRES_PASSWORD: cinescope
  POSTGRES_HOST_AUTH_METHOD: trust


# --- TEST ---
# pytest sur le backend, avec une vraie postgres en service GitLab.
# (Indispensable depuis qu'on est passés de SQLite à Postgres.)
test-backend:
  stage: test
  image: python:3.11-slim
  services:
    - name: postgres:16-alpine
      alias: postgres
  variables:
    DB_HOST: postgres
    DB_PORT: "5432"
    DB_NAME: cinescope
    DB_USER: cinescope
    DB_PASSWORD: cinescope
  cache:
    key: pip-$CI_COMMIT_REF_SLUG
    paths:
      - .cache/pip
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends gcc libpq-dev > /dev/null
  script:
    - cd backend
    - pip install -r requirements.txt
    - pytest test_main.py -v --tb=short --junitxml=report.xml
  artifacts:
    when: always
    reports:
      junit: backend/report.xml
    expire_in: 1 week


# --- BUILD ---
# Push des deux images dans la GitLab Container Registry (tag = SHA + latest).
build-backend:
  stage: build
  image: docker:24.0
  services:
    - docker:24.0-dind
  needs: [test-backend]
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build -t "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA" ./backend
    - docker push "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA"
    - docker tag "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA" "$CI_REGISTRY_IMAGE/backend:latest"
    - docker push "$CI_REGISTRY_IMAGE/backend:latest"

build-frontend:
  stage: build
  image: docker:24.0
  services:
    - docker:24.0-dind
  needs: [test-backend]
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build -t "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA" ./frontend
    - docker push "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA"
    - docker tag "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA" "$CI_REGISTRY_IMAGE/frontend:latest"
    - docker push "$CI_REGISTRY_IMAGE/frontend:latest"


# --- DEPLOY ---
# Sur un projet pro : kubectl apply / helm upgrade.
# Ici on se contente d'afficher les images publiées (uniquement sur main).
deploy:
  stage: deploy
  image: alpine:3.19
  needs: [build-backend, build-frontend]
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - echo "=== Images publiees ==="
    - echo "  backend  -> $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA"
    - echo "  frontend -> $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA"
    - echo "=== Deploiement simule OK ==="
  environment:
    name: production
