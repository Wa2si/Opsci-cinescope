<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cinescope</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet" />
  <!-- css inline pour le mode mono-conteneur -->
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#09090b;--bg-elevated:#111113;--surface:#16161a;--surface-hover:#1c1c21;--border:rgba(255,255,255,0.06);--border-hover:rgba(255,255,255,0.12);--accent:#7c5cfc;--accent-muted:rgba(124,92,252,0.1);--accent-border:rgba(124,92,252,0.25);--text:#fafafa;--text-secondary:#a1a1aa;--text-muted:#52525b;--radius-sm:8px;--radius:12px;--radius-lg:16px;--radius-full:9999px;--transition:150ms cubic-bezier(0.4,0,0.2,1)}
    html{scroll-behavior:smooth}
    body{font-family:'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
    .navbar{position:fixed;top:0;left:0;right:0;z-index:100;height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(1.25rem,4vw,2.5rem);background:rgba(9,9,11,0.8);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);transition:background var(--transition)}
    .navbar.scrolled{background:rgba(9,9,11,0.95)}
    .nav-brand{font-family:'Poppins',sans-serif;font-weight:700;font-size:1.15rem;color:var(--text);text-decoration:none;display:flex;align-items:center;gap:0.5rem;letter-spacing:-0.02em;flex-shrink:0}
    .nav-dot{width:7px;height:7px;background:var(--accent);border-radius:50%;flex-shrink:0}
    .nav-right{display:flex;align-items:center;gap:1rem}
    .nav-mode{font-size:0.7rem;font-weight:500;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted)}
    .nav-mode span{color:var(--accent)}
    .nav-count{font-size:0.75rem;color:var(--text-secondary);font-variant-numeric:tabular-nums}
    .main{max-width:1200px;margin:0 auto;padding:calc(60px + 3rem) clamp(1.25rem,4vw,2.5rem) 3rem}
    .header{margin-bottom:2rem}
    .header-top{display:flex;align-items:flex-end;justify-content:space-between;gap:1.5rem;flex-wrap:wrap;margin-bottom:1.5rem}
    .header h1{font-family:'Poppins',sans-serif;font-size:clamp(1.75rem,4vw,2.5rem);font-weight:800;letter-spacing:-0.03em;line-height:1.1}
    .header p{font-size:0.9rem;color:var(--text-secondary);line-height:1.6;max-width:420px}
    .search-row{display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap}
    .search-box{position:relative;flex:1;min-width:200px;max-width:420px}
    .search-icon{position:absolute;left:0.85rem;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--text-muted);pointer-events:none}
    .search-input{width:100%;padding:0.6rem 0.85rem 0.6rem 2.5rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:'Inter',sans-serif;font-size:0.82rem;outline:none;transition:all var(--transition)}
    .search-input::placeholder{color:var(--text-muted)}
    .search-input:focus{border-color:var(--accent-border);background:var(--bg-elevated);box-shadow:0 0 0 3px var(--accent-muted)}
    .search-clear{position:absolute;right:0.6rem;top:50%;transform:translateY(-50%);width:20px;height:20px;border:none;background:var(--surface-hover);color:var(--text-muted);border-radius:50%;font-size:0.65rem;cursor:pointer;display:none;align-items:center;justify-content:center;transition:all var(--transition)}
    .search-clear.visible{display:flex}
    .search-clear:hover{background:var(--border-hover);color:var(--text)}
    .controls{display:flex;align-items:center;gap:0.35rem;padding:3px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-full);width:fit-content;flex-shrink:0}
    .limit-btn{padding:0.4rem 1rem;border:none;background:transparent;color:var(--text-muted);border-radius:var(--radius-full);font-family:'Inter',sans-serif;font-size:0.78rem;font-weight:500;cursor:pointer;transition:all var(--transition);user-select:none}
    .limit-btn:hover{color:var(--text-secondary)}
    .limit-btn:active{transform:scale(0.95)}
    .limit-btn.active{background:var(--accent);color:white;box-shadow:0 1px 4px rgba(124,92,252,0.3)}
    .results-info{font-size:0.75rem;color:var(--text-muted);margin-bottom:1.25rem;min-height:1.2em}
    .results-info span{color:var(--text-secondary)}
    .movies-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:1.1rem}
    .movie-card{position:relative;border-radius:var(--radius-lg);overflow:hidden;background:var(--surface);border:1px solid var(--border);transition:all .3s cubic-bezier(.4,0,.2,1);cursor:pointer;opacity:0;transform:translateY(12px)}
    .movie-card.visible{animation:cardReveal .4s ease forwards}
    @keyframes cardReveal{to{opacity:1;transform:translateY(0)}}
    .movie-card:hover{border-color:var(--border-hover);background:var(--surface-hover);transform:translateY(-4px);box-shadow:0 12px 40px -8px rgba(0,0,0,0.5)}
    .movie-card:active{transform:translateY(-2px) scale(0.98)}
    .card-poster{position:relative;aspect-ratio:2/3;overflow:hidden;background:var(--bg-elevated)}
    .card-poster img{width:100%;height:100%;object-fit:cover;transition:transform .4s ease,opacity .3s ease}
    .movie-card:hover .card-poster img{transform:scale(1.04)}
    .card-poster::after{content:'';position:absolute;bottom:0;left:0;right:0;height:40%;background:linear-gradient(to top,var(--surface),transparent);pointer-events:none}
    .card-poster-fallback{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:2.5rem;background:linear-gradient(135deg,var(--surface) 0%,var(--bg-elevated) 100%);color:var(--text-muted)}
    .card-badge{position:absolute;top:0.6rem;left:0.6rem;z-index:2;padding:0.2rem 0.55rem;font-size:0.6rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--text);background:rgba(0,0,0,0.55);backdrop-filter:blur(10px);border-radius:var(--radius-full)}
    .card-body{padding:0.85rem 0.9rem 1rem}
    .card-title{font-family:'Poppins',sans-serif;font-weight:600;font-size:0.85rem;letter-spacing:-0.01em;margin-bottom:0.15rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .card-meta{font-size:0.7rem;color:var(--text-muted);margin-bottom:0.5rem}
    .card-desc{font-size:0.75rem;color:var(--text-secondary);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .skeleton-card{border-radius:var(--radius-lg);overflow:hidden;background:var(--surface);border:1px solid var(--border)}
    .skeleton-poster{aspect-ratio:2/3;background:var(--bg-elevated);animation:pulse 2s cubic-bezier(.4,0,.6,1) infinite}
    .skeleton-body{padding:0.85rem 0.9rem 1rem;display:flex;flex-direction:column;gap:0.45rem}
    .skeleton-line{height:10px;border-radius:var(--radius-full);background:var(--bg-elevated);animation:pulse 2s cubic-bezier(.4,0,.6,1) infinite}
    .skeleton-line:nth-child(1){width:65%;height:12px}.skeleton-line:nth-child(2){width:40%}.skeleton-line:nth-child(3){width:90%;margin-top:0.2rem}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
    .empty-state,.error-state{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem 1.5rem;text-align:center}
    .empty-state .empty-icon{font-size:2rem;margin-bottom:1rem;opacity:0.4}
    .empty-state h3{font-family:'Poppins',sans-serif;font-size:1rem;font-weight:600;margin-bottom:0.35rem;color:var(--text-secondary)}
    .empty-state p{font-size:0.82rem;color:var(--text-muted)}
    .error-icon{width:48px;height:48px;border-radius:50%;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.15);display:flex;align-items:center;justify-content:center;font-size:1.2rem;margin-bottom:1rem;color:#ef4444}
    .error-state h3{font-family:'Poppins',sans-serif;font-size:1rem;font-weight:600;margin-bottom:0.35rem}
    .error-state p{font-size:0.82rem;color:var(--text-secondary);max-width:300px;line-height:1.5}
    .error-retry{margin-top:1rem;padding:0.45rem 1.2rem;border:1px solid var(--border);background:var(--surface);color:var(--text);border-radius:var(--radius-full);font-family:'Inter',sans-serif;font-size:0.78rem;font-weight:500;cursor:pointer;transition:all var(--transition)}
    .error-retry:hover{background:var(--surface-hover);border-color:var(--border-hover)}
    .error-retry:active{transform:scale(0.95)}
    .footer{max-width:1200px;margin:0 auto;padding:2rem clamp(1.25rem,4vw,2.5rem);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:0.7rem;color:var(--text-muted)}
    .footer a{color:var(--text-secondary);text-decoration:none;transition:color var(--transition)}
    .footer a:hover{color:var(--accent)}
    /* Modal */
    .modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity .3s,visibility .3s;padding:1.5rem}
    .modal-overlay.active{opacity:1;visibility:visible}
    .modal-container{position:relative;width:100%;max-width:900px;max-height:90vh;overflow-y:auto;background:var(--bg);border:1px solid var(--border);border-radius:20px;transform:translateY(20px) scale(0.97);transition:transform .35s cubic-bezier(.22,1,.36,1)}
    .modal-overlay.active .modal-container{transform:translateY(0) scale(1)}
    .modal-container::-webkit-scrollbar{width:6px}.modal-container::-webkit-scrollbar-track{background:transparent}.modal-container::-webkit-scrollbar-thumb{background:var(--border-hover);border-radius:3px}
    .modal-close{position:absolute;top:1rem;right:1rem;z-index:10;width:36px;height:36px;border:none;background:rgba(0,0,0,0.5);backdrop-filter:blur(10px);color:var(--text);border-radius:50%;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--transition)}
    .modal-close:hover{background:rgba(255,255,255,0.15)}
    .modal-backdrop-wrap{position:relative;width:100%;height:320px;overflow:hidden;border-radius:20px 20px 0 0}
    .modal-backdrop{width:100%;height:100%;object-fit:cover}
    .modal-backdrop-fade{position:absolute;inset:0;background:linear-gradient(to top,var(--bg) 0%,rgba(9,9,11,0.4) 50%,rgba(9,9,11,0.2) 100%)}
    .modal-body{display:flex;gap:2rem;padding:0 2rem 2rem;margin-top:-80px;position:relative;z-index:2}
    .modal-poster-col{flex-shrink:0}
    .modal-poster{width:180px;border-radius:var(--radius);box-shadow:0 8px 30px rgba(0,0,0,0.5)}
    .modal-info{flex:1;min-width:0}
    .modal-tagline{font-size:0.78rem;font-style:italic;color:var(--text-muted);margin-bottom:0.5rem}
    .modal-title{font-family:'Poppins',sans-serif;font-size:1.6rem;font-weight:800;letter-spacing:-0.02em;line-height:1.15;margin-bottom:0.6rem}
    .modal-meta-row{display:flex;align-items:center;gap:0.75rem;font-size:0.8rem;color:var(--text-secondary);margin-bottom:0.75rem;flex-wrap:wrap}
    .modal-meta-row span{display:flex;align-items:center;gap:0.25rem}
    .modal-rating{color:#facc15;font-weight:600}
    .modal-vote-max{color:var(--text-muted);font-weight:400}
    .modal-votes{color:var(--text-muted);font-size:0.7rem}
    .modal-genres{display:flex;flex-wrap:wrap;gap:0.35rem;margin-bottom:1rem}
    .modal-genre-tag{padding:0.2rem 0.6rem;font-size:0.65rem;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;background:var(--accent-muted);color:var(--accent);border-radius:var(--radius-full)}
    .modal-overview{font-size:0.85rem;color:var(--text-secondary);line-height:1.65;margin-bottom:1.25rem}
    .modal-label{display:block;font-size:0.65rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:0.4rem}
    .modal-director{margin-bottom:1.25rem}
    .modal-director span:last-child{font-size:0.85rem;color:var(--text);font-weight:500}
    .modal-cast-section{margin-bottom:1.5rem}
    .modal-cast-grid{display:flex;gap:0.75rem;overflow-x:auto;padding-bottom:0.5rem;scrollbar-width:thin;scrollbar-color:var(--border-hover) transparent}
    .modal-cast-grid::-webkit-scrollbar{height:4px}.modal-cast-grid::-webkit-scrollbar-track{background:transparent}.modal-cast-grid::-webkit-scrollbar-thumb{background:var(--border-hover);border-radius:2px}
    .modal-cast-item{flex-shrink:0;width:72px;text-align:center}
    .modal-cast-photo{width:56px;height:56px;border-radius:50%;object-fit:cover;margin:0 auto 0.35rem;display:block;border:1px solid var(--border)}
    .modal-cast-placeholder{display:flex;align-items:center;justify-content:center;background:var(--surface);font-size:1.2rem}
    .modal-cast-name{font-size:0.65rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .modal-cast-char{font-size:0.6rem;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .modal-trailer-section{margin-bottom:0.5rem}
    .modal-trailer-wrap{position:relative;width:100%;padding-top:56.25%;border-radius:var(--radius);overflow:hidden;background:var(--surface)}
    .modal-trailer-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    .modal-loading{display:flex;align-items:center;justify-content:center;min-height:300px}
    .modal-spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .modal-error{padding:3rem 2rem;text-align:center;color:var(--text-secondary);font-size:0.9rem}
    @media(max-width:768px){.search-row{flex-direction:column;align-items:stretch}.search-box{max-width:100%}.controls{align-self:flex-start}}
    @media(max-width:640px){.movies-grid{grid-template-columns:repeat(2,1fr);gap:0.75rem}.header-top{flex-direction:column;align-items:flex-start}.card-body{padding:0.65rem 0.7rem 0.85rem}.card-desc{-webkit-line-clamp:1}.modal-body{flex-direction:column;align-items:center;text-align:center;padding:0 1.25rem 1.5rem;gap:1rem;margin-top:-60px}.modal-poster{width:140px}.modal-meta-row{justify-content:center}.modal-genres{justify-content:center}.modal-backdrop-wrap{height:200px}.modal-container{max-height:95vh}.modal-title{font-size:1.3rem}}
    @media(max-width:380px){.movies-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="#" class="nav-brand"><span class="nav-dot"></span>cinescope</a>
    <div class="nav-right">
      <span class="nav-mode"><span id="mode-indicator">...</span></span>
      <span class="nav-count"><span id="movie-count">0</span> films</span>
    </div>
  </nav>
  <main class="main">
    <div class="header">
      <div class="header-top"><div><h1>Catalogue</h1><p>Films populaires via TMDB ou notre collection interne.</p></div></div>
      <div class="search-row">
        <div class="search-box">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input type="text" class="search-input" id="search-input" placeholder="Rechercher un film, realisateur, genre..." autocomplete="off"/>
          <button class="search-clear" id="search-clear">&times;</button>
        </div>
        <div class="controls">
          <button class="limit-btn" data-limit="6">6</button>
          <button class="limit-btn" data-limit="12">12</button>
          <button class="limit-btn active" data-limit="20">20</button>
        </div>
      </div>
    </div>
    <div class="results-info" id="results-info"></div>
    <div id="movies-grid" class="movies-grid"></div>
  </main>
  <footer class="footer"><span>cinescope &copy; 2025</span><a href="https://www.themoviedb.org/" target="_blank" rel="noopener">TMDB</a></footer>
  <div class="modal-overlay" id="movie-modal"><div class="modal-container" id="modal-content"></div></div>
  <!-- api base vide = meme origine (mode mono-conteneur) -->
  <script>window.__API_BASE="";</script>
  <!-- js inline, version compacte du script.js -->
  <script>
  (()=>{"use strict";const A=window.__API_BASE||"";let L=20,ST=null;const G=document.getElementById("movies-grid"),C=document.getElementById("movie-count"),M=document.getElementById("mode-indicator"),RI=document.getElementById("results-info"),B=document.querySelectorAll(".limit-btn"),N=document.querySelector(".navbar"),SI=document.getElementById("search-input"),SC=document.getElementById("search-clear"),MO=document.getElementById("movie-modal"),MC=document.getElementById("modal-content");
  let t=!1;window.addEventListener("scroll",()=>{t||(requestAnimationFrame(()=>{N.classList.toggle("scrolled",window.scrollY>10);t=!1}),t=!0)});
  const O=new IntersectionObserver(e=>{e.forEach(x=>{x.isIntersecting&&(x.target.classList.add("visible"),O.unobserve(x.target))})},{threshold:.05});
  function skel(n){G.innerHTML="";for(let i=0;i<n;i++){const d=document.createElement("div");d.className="skeleton-card";d.innerHTML='<div class="skeleton-poster"></div><div class="skeleton-body"><div class="skeleton-line"></div><div class="skeleton-line"></div><div class="skeleton-line"></div></div>';G.appendChild(d)}}
  function card(m,i){const c=document.createElement("article");c.className="movie-card";c.style.animationDelay=i*.05+"s";const h=m.image_url&&m.image_url.length>10;c.innerHTML='<div class="card-poster">'+(h?'<img src="'+m.image_url+'" alt="'+m.title+'" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'"/><div class="card-poster-fallback" style="display:none">🎬</div>':'<div class="card-poster-fallback">🎬</div>')+'<span class="card-badge">'+m.genre+'</span></div><div class="card-body"><div class="card-title">'+m.title+'</div><div class="card-meta">'+m.year+(m.director&&m.director!=="N/A"?" · "+m.director:"")+'</div><p class="card-desc">'+m.description+"</p></div>";if(m.id)c.addEventListener("click",()=>openM(m.id));setTimeout(()=>O.observe(c),10);return c}
  async function openM(id){MO.classList.add("active");document.body.style.overflow="hidden";MC.innerHTML='<div class="modal-loading"><div class="modal-spinner"></div></div>';try{const r=await fetch(A+"/movie/"+id);const m=await r.json();if(m.error)throw 0;const stars=m.vote_average?m.vote_average.toFixed(1)+'<span class="modal-vote-max">/10</span>':"";const rt=m.runtime?Math.floor(m.runtime/60)+"h"+String(m.runtime%60).padStart(2,"0"):"";MC.innerHTML='<div class="modal-backdrop-wrap">'+(m.backdrop_url?'<img class="modal-backdrop" src="'+m.backdrop_url+'" alt=""/>':'')+'<div class="modal-backdrop-fade"></div></div><button class="modal-close">&times;</button><div class="modal-body"><div class="modal-poster-col">'+(m.image_url?'<img class="modal-poster" src="'+m.image_url+'" alt="'+m.title+'"/>':'')+'</div><div class="modal-info">'+(m.tagline?'<p class="modal-tagline">'+m.tagline+"</p>":"")+'<h2 class="modal-title">'+m.title+'</h2><div class="modal-meta-row">'+(m.year?"<span>"+m.year+"</span>":"")+(rt?"<span>"+rt+"</span>":"")+(stars?'<span class="modal-rating">★ '+stars+"</span>":"")+(m.vote_count?'<span class="modal-votes">'+m.vote_count.toLocaleString()+" votes</span>":"")+'</div><div class="modal-genres">'+(m.genres||[]).map(g=>'<span class="modal-genre-tag">'+g+"</span>").join("")+'</div><p class="modal-overview">'+m.description+'</p><div class="modal-director"><span class="modal-label">Realisateur</span><span>'+m.director+"</span></div>"+(m.cast&&m.cast.length?'<div class="modal-cast-section"><span class="modal-label">Casting</span><div class="modal-cast-grid">'+m.cast.map(c=>'<div class="modal-cast-item">'+(c.photo?'<img class="modal-cast-photo" src="'+c.photo+'" alt="'+c.name+'" onerror="this.style.display=\'none\'"/>':'<div class="modal-cast-photo modal-cast-placeholder">👤</div>')+'<div class="modal-cast-name">'+c.name+'</div><div class="modal-cast-char">'+c.character+"</div></div>").join("")+"</div></div>":"")+(m.trailer_key?'<div class="modal-trailer-section"><span class="modal-label">Bande-annonce</span><div class="modal-trailer-wrap"><iframe src="https://www.youtube.com/embed/'+m.trailer_key+'?rel=0" title="Trailer" frameborder="0" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe></div></div>':"")+"</div></div>";MC.querySelector(".modal-close").addEventListener("click",closeM)}catch{MC.innerHTML='<button class="modal-close">&times;</button><div class="modal-error">Impossible de charger les details.</div>';MC.querySelector(".modal-close").addEventListener("click",closeM)}}
  function closeM(){MO.classList.remove("active");document.body.style.overflow="";const f=MC.querySelector("iframe");if(f)f.src=""}
  MO.addEventListener("click",e=>{if(e.target===MO)closeM()});document.addEventListener("keydown",e=>{if(e.key==="Escape"&&MO.classList.contains("active"))closeM()});
  function empty(q){G.innerHTML='<div class="empty-state"><div class="empty-icon">🔍</div><h3>Aucun resultat</h3><p>Aucun film pour «\u00a0'+q+'\u00a0»</p></div>'}

  async function f(){const q=SI.value.trim();skel(q?8:L);RI.innerHTML="";try{const url=q?A+"/search?q="+encodeURIComponent(q):A+"/movies?limit="+L;const r=await fetch(url);if(!r.ok)throw 0;const d=await r.json(),mv=Array.isArray(d)?d:d.fallback||[];G.innerHTML="";if(!mv.length&&q){empty(q)}else{mv.forEach((m,i)=>G.appendChild(card(m,i)))}C.textContent=mv.length;if(q)RI.innerHTML="<span>"+mv.length+"</span> resultat"+(mv.length!==1?"s":"")+" pour «\u00a0"+q+"\u00a0»";try{const h=await fetch(A+"/hello");const j=await h.json();M.textContent=j.mode==="tmdb"?"live":"mock"}catch{M.textContent="mock"}}catch{err("Le backend ne repond pas.")}}
  window.__f=f;
