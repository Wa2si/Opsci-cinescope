# 3 services : postgres + backend + frontend
# Pour tout lancer : docker compose up --build  (ou ./start.sh)

services:
  db:
    image: postgres:16-alpine
    container_name: cinescope-db
    environment:
      POSTGRES_DB: cinescope
      POSTGRES_USER: cinescope
      POSTGRES_PASSWORD: cinescope
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    # Healthcheck obligatoire ici, sinon le backend démarre avant
    # que postgres ait fini de s'init et plante.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinescope"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - films-net

  backend:
    build: ./backend
    image: films-backend
    container_name: films-backend
    ports:
      - "8000:8000"
    environment:
      - TMDB_API_KEY=${TMDB_API_KEY:-}   # vide -> mode mock
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=cinescope
      - DB_USER=cinescope
      - DB_PASSWORD=cinescope
    depends_on:
      db:
        condition: service_healthy
    networks:
      - films-net

  frontend:
    build: ./frontend
    image: films-frontend
    container_name: films-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - films-net

networks:
  films-net:
    driver: bridge

volumes:
  pg_data:
