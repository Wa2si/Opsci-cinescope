# deployment postgres : 1 seul replica (la db est stateful)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: cinescope
  labels:
    app: cinescope
    tier: db
spec:
  replicas: 1
  strategy:
    type: Recreate    # pas de rolling update pour la db (un seul writer a la fois)
  selector:
    matchLabels:
      app: cinescope
      tier: db
  template:
    metadata:
      labels:
        app: cinescope
        tier: db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: cinescope-config
                  key: DB_NAME
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: cinescope-config
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cinescope-secret
                  key: DB_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "cinescope"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "cinescope"]
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: pg-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: pg-data
          persistentVolumeClaim:
            claimName: postgres-pvc
