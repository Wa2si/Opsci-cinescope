# secrets : mot de passe postgres + cle TMDB
# les valeurs sont en clair pour la simplicite (stringData), k8s les encode en base64
# pour la prod on les passerait via un sealed-secret ou Vault
apiVersion: v1
kind: Secret
metadata:
  name: cinescope-secret
  namespace: cinescope
type: Opaque
stringData:
  DB_PASSWORD: "cinescope"
  TMDB_API_KEY: ""    # vide = mode mock, a remplir si on veut le mode live
